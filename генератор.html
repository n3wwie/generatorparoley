<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Password Generator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #818cf8;
            --accent-secondary: #c084fc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .result-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            margin-bottom: 24px;
            position: relative;
        }

        #password-display {
            font-family: 'Courier New', Courier, monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            word-break: break-all;
            margin-right: 10px;
            color: #fff;
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-copy:hover {
            background: var(--accent-primary);
            transform: scale(1.05);
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        label {
            color: var(--text-muted);
            font-size: 15px;
        }

        .length-slider {
            width: 100%;
            margin-top: 8px;
            accent-color: var(--accent-primary);
        }

        .length-value {
            font-weight: bold;
            color: var(--accent-secondary);
        }

        /* Кастомные чекбоксы (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 24px;


}

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent-primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-generate {
            width: 100%;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            color: white;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 8px 20px rgba(129, 140, 248, 0.3);
            transition: all 0.3s ease;
        }

        .btn-generate:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(129, 140, 248, 0.4);
        }

        .btn-generate:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор Паролей</h1>
    
    <div class="result-container">
        <span id="password-display">Нажмите Сгенерировать</span>
        <button class="btn-copy" id="copy-btn">Копия</button>
    </div>

    <div class="settings">
        <div style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between;">
                <label>Длина пароля</label>
                <span class="length-value" id="length-val">12</span>
            </div>
            <input type="range" id="length-slider" class="length-slider" min="6" max="32" value="12">
        </div>

        <div class="setting-item">
            <label>Прописные буквы (A-Z)</label>
            <label class="switch">
                <input type="checkbox" id="uppercase" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <label>Строчные буквы (a-z)</label>
            <label class="switch">
                <input type="checkbox" id="lowercase" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <label>Цифры (0-9)</label>
            <label class="switch">
                <input type="checkbox" id="numbers" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="setting-item">
            <label>Специальные знаки (!@#$)</label>
            <label class="switch">
                <input type="checkbox" id="symbols">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <button class="btn-generate" id="generate-btn">Сгенерировать</button>
</div>

<script>
    const display = document.getElementById('password-display');
    const slider = document.getElementById('length-slider');
    const lengthVal = document.getElementById('length-val');
    const uppercaseEl = document.getElementById('uppercase');
    const lowercaseEl = document.getElementById('lowercase');
    const numbersEl = document.getElementById('numbers');
    const symbolsEl = document.getElementById('symbols');
    const generateBtn = document.getElementById('generate-btn');
    const copyBtn = document.getElementById('copy-btn');

    const chars = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numeric: '0123456789',
        special: '!@#$%^&*()_+~`|}{[]:;?><,./-='
    };

    slider.addEventListener('input', (e) => {
        lengthVal.innerText = e.target.value;
    });

    function generatePassword() {
        let length = parseInt(slider.value);
        let allowedChars = '';
        let password = '';

        if (uppercaseEl.checked) allowedChars += chars.upper;

if (lowercaseEl.checked) allowedChars += chars.lower;
        if (numbersEl.checked) allowedChars += chars.numeric;
        if (symbolsEl.checked) allowedChars += chars.special;

        if (allowedChars === '') {
            display.innerText = 'Выберите опцию!';
            display.style.color = '#f44336';
            return;
        }

        display.style.color = '#fff';

        for (let i = 0; i < length; i++) {
            const randomIndex = Math.floor(Math.random() * allowedChars.length);
            password += allowedChars[randomIndex];
        }

        display.innerText = password;
    }

    generateBtn.addEventListener('click', generatePassword);

    copyBtn.addEventListener('click', () => {
        const pass = display.innerText;
        if (pass === 'Нажмите Сгенерировать' || pass === 'Выберите опцию!' || pass === 'Скопировано!') return;
        
        navigator.clipboard.writeText(pass).then(() => {
            const oldText = copyBtn.innerText;
            copyBtn.innerText = '✓';
            copyBtn.style.background = '#10b981';
            setTimeout(() => {
                copyBtn.innerText = oldText;
                copyBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            }, 1500);
        });
    });
</script>

</body>
</html>
